<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Oli Cerdas">
  <meta name="description" content="Pengingat servis kendaraan - catat KM, ganti oli, dan keluhan dengan mudah">
  <meta name="apple-mobile-web-app-status-bar" content="black-translucent">
  <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect fill='%230a0f1e' width='192' height='192'/%3E%3Ccircle cx='96' cy='96' r='60' fill='%2338bdf8'/%3E%3Ccircle cx='96' cy='96' r='50' fill='%230a0f1e'/%3E%3Cpath d='M96 70v50M70 96h50' stroke='%2338bdf8' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect fill='%230a0f1e' width='180' height='180' rx='40'/%3E%3Ccircle cx='90' cy='90' r='55' fill='%2338bdf8'/%3E%3Ccircle cx='90' cy='90' r='45' fill='%230a0f1e'/%3E%3Cpath d='M90 65v45M65 90h45' stroke='%2338bdf8' stroke-width='6' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="manifest" href="manifest.json">
 </head>
 <body class="h-full bg-slate-950 text-slate-100">
  <title>Oli Cerdas</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <script>
tailwind.config={theme:{extend:{fontFamily:{main:['"Plus Jakarta Sans"','sans-serif']},colors:{slate:{950:'#0a0f1e'}}}}}
</script>
  <style>
*{font-family:'Plus Jakarta Sans',sans-serif;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;overflow:hidden}
.page{display:none;height:100%;overflow-y:auto}
.page.active{display:flex;flex-direction:column}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
.bar-gradient{background:linear-gradient(90deg,#22c55e 0%,#22c55e 50%,#eab308 70%,#ef4444 100%)}
.card-glass{background:rgba(30,41,59,0.7);backdrop-filter:blur(12px);border:1px solid rgba(148,163,184,0.1)}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-ring{0%{transform:scale(.8);opacity:1}100%{transform:scale(1.4);opacity:0}}
.pulse-ring{animation:pulse-ring 1.5s ease infinite}
.notify-dot{width:8px;height:8px;background:#ef4444;border-radius:50%;position:absolute;top:2px;right:2px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.3);border-radius:4px}
.tab-btn.active-tab{color:#38bdf8;border-color:#38bdf8}
.tab-btn{transition:all .2s}
</style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <div id="app" class="h-full flex flex-col w-full max-w-lg mx-auto relative" style="background:linear-gradient(165deg,#0a0f1e 0%,#1e293b 50%,#0f172a 100%)"><!-- Header -->
   <header class="flex items-center justify-between px-4 pt-4 pb-2 flex-shrink-0">
    <div class="flex items-center gap-2">
     <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,#38bdf8,#818cf8)">
      <svg width="20" height="20" viewbox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
       <circle cx="12" cy="12" r="3" /><path d="M12 1v4m0 14v4M4.22 4.22l2.83 2.83m9.9 9.9l2.83 2.83M1 12h4m14 0h4M4.22 19.78l2.83-2.83m9.9-9.9l2.83-2.83" />
      </svg>
     </div>
     <div>
      <h1 id="appTitle" class="text-lg font-bold leading-tight">Oli Cerdas</h1>
      <p class="text-[10px] text-slate-400 -mt-0.5">Pengingat Servis Kendaraan</p>
     </div>
    </div><button onclick="showPage('notifikasi')" class="relative w-10 h-10 rounded-xl card-glass flex items-center justify-center"> <i data-lucide="bell" class="w-5 h-5 text-slate-300"></i>
     <div id="notifDot" class="notify-dot hidden"></div></button>
   </header><!-- Page: Dashboard -->
   <div id="page-dashboard" class="page active flex-1 px-4 pb-24 pt-2 overflow-y-auto"><!-- No Vehicle State -->
    <div id="noVehicle" class="flex flex-col items-center justify-center py-16 text-center hidden">
     <div class="w-20 h-20 rounded-full bg-slate-800 flex items-center justify-center mb-4">
      <svg width="36" height="36" viewbox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="1.5">
       <circle cx="12" cy="12" r="10" /><path d="M12 8v4m0 4h.01" />
      </svg>
     </div>
     <p class="text-slate-400 text-sm mb-1">Belum ada kendaraan</p>
     <p class="text-slate-500 text-xs mb-4">Tambahkan kendaraan pertamamu</p><button onclick="showPage('tambah-kendaraan')" class="px-5 py-2.5 rounded-xl font-semibold text-sm text-white" style="background:linear-gradient(135deg,#38bdf8,#818cf8)">+ Tambah Kendaraan</button>
    </div><!-- Vehicle Cards -->
    <div id="vehicleCards" class="space-y-4"></div><!-- Add Vehicle FAB --> <button id="fabAdd" onclick="showPage('tambah-kendaraan')" class="hidden fixed bottom-24 right-4 w-14 h-14 rounded-2xl shadow-lg shadow-sky-500/30 text-white flex items-center justify-center text-2xl font-light z-30" style="background:linear-gradient(135deg,#38bdf8,#818cf8);max-width:calc(min(32rem,100%) - 2rem);margin-left:auto"> <i data-lucide="plus" class="w-6 h-6"></i> </button>
   </div><!-- Page: Tambah Kendaraan -->
   <div id="page-tambah-kendaraan" class="page flex-1 px-4 pb-24 pt-2 overflow-y-auto">
    <div class="fade-in"><button onclick="showPage('dashboard')" class="flex items-center gap-1 text-slate-400 text-sm mb-4"><i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali</button>
     <h2 class="text-xl font-bold mb-4">Tambah Kendaraan</h2>
     <form id="formKendaraan" onsubmit="return simpanKendaraan(event)" class="space-y-4">
      <div><label class="text-xs text-slate-400 mb-1 block">Jenis Kendaraan</label> <input id="inJenis" type="text" required placeholder="cth: Vario 125, NMAX Neo, City Z" class="w-full bg-slate-800/80 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-sky-500 placeholder-slate-500">
      </div>
      <div><label class="text-xs text-slate-400 mb-1 block">Interval Ganti Oli (KM)</label> <input id="inOliKm" type="text" inputmode="numeric" required placeholder="cth: 2.000" class="w-full bg-slate-800/80 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-sky-500 placeholder-slate-500" oninput="formatRibuan(this)">
      </div>
      <div><label class="text-xs text-slate-400 mb-1 block">Interval Servis CVT (kelipatan ganti oli)</label> <select id="inCvt" class="w-full bg-slate-800/80 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-sky-500 text-slate-100"> <option value="2">Setiap 2x ganti oli</option> <option value="3">Setiap 3x ganti oli</option> </select>
      </div>
      <div><label class="text-xs text-slate-400 mb-1 block">KM Saat Ini</label> <input id="inKmAwal" type="text" inputmode="numeric" required placeholder="cth: 15.000" class="w-full bg-slate-800/80 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-sky-500 placeholder-slate-500" oninput="formatRibuan(this)">
      </div>
      <div><label class="text-xs text-slate-400 mb-1 block">KM Terakhir Ganti Oli</label> <input id="inKmOliTerakhir" type="text" inputmode="numeric" required placeholder="cth: 14.000" class="w-full bg-slate-800/80 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-sky-500 placeholder-slate-500" oninput="formatRibuan(this)">
      </div>
      <div><label class="text-xs text-slate-400 mb-1 block">Hitungan Ganti Oli Sejak Servis CVT Terakhir</label> <select id="inOliCountCvt" class="w-full bg-slate-800/80 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-sky-500 text-slate-100"> <option value="0">0 (baru servis CVT)</option> <option value="1" selected>1</option> <option value="2">2</option> </select>
      </div><button type="submit" class="w-full py-3 rounded-xl font-bold text-white text-sm" style="background:linear-gradient(135deg,#38bdf8,#818cf8)">Simpan Kendaraan</button>
     </form>
    </div>
   </div><!-- Page: Detail Kendaraan -->
   <div id="page-detail" class="page flex-1 px-4 pb-24 pt-2 overflow-y-auto">
    <div id="detailContent" class="fade-in"></div>
   </div><!-- Page: Catat KM & Keluhan -->
   <div id="page-catat" class="page flex-1 px-4 pb-24 pt-2 overflow-y-auto">
    <div id="catatContent" class="fade-in"></div>
   </div><!-- Page: Catat Keluar Bengkel -->
   <div id="page-bengkel" class="page flex-1 px-4 pb-24 pt-2 overflow-y-auto">
    <div id="bengkelContent" class="fade-in"></div>
   </div><!-- Page: Notifikasi -->
   <div id="page-notifikasi" class="page flex-1 px-4 pb-24 pt-2 overflow-y-auto">
    <div id="notifContent" class="fade-in"></div>
   </div><!-- Page: Riwayat -->
   <div id="page-riwayat" class="page flex-1 px-4 pb-24 pt-2 overflow-y-auto">
    <div id="riwayatContent" class="fade-in"></div>
   </div><!-- Bottom Nav -->
   <nav class="flex-shrink-0 flex justify-around items-center py-2 pb-3 border-t border-slate-800/60 bg-slate-950/90 backdrop-blur-lg" style="padding-bottom:max(12px,env(safe-area-inset-bottom))"><button onclick="showPage('dashboard')" class="tab-btn active-tab flex flex-col items-center gap-0.5 px-3 py-1 border-b-2 border-transparent" data-tab="dashboard"> <i data-lucide="layout-dashboard" class="w-5 h-5"></i><span class="text-[10px]">Dashboard</span> </button> <button onclick="if(!currentVehicleId){showToast('Pilih kendaraan dulu');return}showPage('catat')" class="tab-btn flex flex-col items-center gap-0.5 px-3 py-1 border-b-2 border-transparent" data-tab="catat"> <i data-lucide="file-edit" class="w-5 h-5"></i><span class="text-[10px]">Catat KM</span> </button> <button onclick="if(!currentVehicleId){showToast('Pilih kendaraan dulu');return}showPage('bengkel')" class="tab-btn flex flex-col items-center gap-0.5 px-3 py-1 border-b-2 border-transparent" data-tab="bengkel"> <i data-lucide="wrench" class="w-5 h-5"></i><span class="text-[10px]">Bengkel</span> </button> <button onclick="if(!currentVehicleId){showToast('Pilih kendaraan dulu');return}showPage('riwayat')" class="tab-btn flex flex-col items-center gap-0.5 px-3 py-1 border-b-2 border-transparent" data-tab="riwayat"> <i data-lucide="history" class="w-5 h-5"></i><span class="text-[10px]">Riwayat</span> </button>
   </nav><!-- Toast -->
   <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 bg-slate-700 text-white text-sm px-5 py-2.5 rounded-xl shadow-lg z-50 hidden transition-all"></div><!-- Confirm Modal -->
   <div id="confirmModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
    <div class="card-glass rounded-2xl p-6 max-w-sm w-full">
     <p id="confirmMsg" class="text-sm mb-4"></p>
     <div class="flex gap-3"><button onclick="closeConfirm(false)" class="flex-1 py-2.5 rounded-xl bg-slate-700 text-sm font-semibold">Batal</button> <button onclick="closeConfirm(true)" class="flex-1 py-2.5 rounded-xl bg-red-500 text-sm font-bold">Ya, Hapus</button>
     </div>
    </div>
   </div>
  </div>
  <script>
// ============ STATE ============
let currentVehicleId = null;
let confirmResolve = null;

// ============ STORAGE ============
function getData(){return JSON.parse(localStorage.getItem('olicerdas_data')||'{"vehicles":[],"logs":[],"complaints":[],"services":[]}')}
function setData(d){localStorage.setItem('olicerdas_data',JSON.stringify(d))}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

// ============ FORMAT ============
function formatRibuan(el){
  let v=el.value.replace(/\D/g,'');
  el.value=v.replace(/\B(?=(\d{3})+(?!\d))/g,'.');
}
function parseRibuan(s){return parseInt((s||'0').replace(/\./g,''),10)||0}
function fmtKm(n){return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.')}
function fmtRupiah(n){return 'Rp '+n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.')}
function fmtDate(iso){const d=new Date(iso);return d.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})}

// ============ TOAST & CONFIRM ============
function showToast(msg,dur=2500){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.remove('hidden');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.add('hidden'),dur);
}
function showConfirm(msg){
  document.getElementById('confirmMsg').textContent=msg;
  document.getElementById('confirmModal').classList.remove('hidden');
  return new Promise(r=>{confirmResolve=r});
}
function closeConfirm(val){
  document.getElementById('confirmModal').classList.add('hidden');
  if(confirmResolve)confirmResolve(val);confirmResolve=null;
}

// ============ NAVIGATION ============
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const pg=document.getElementById('page-'+name);
  if(pg)pg.classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.toggle('active-tab',b.dataset.tab===name);
  });
  if(name==='dashboard')renderDashboard();
  if(name==='detail')renderDetail();
  if(name==='catat')renderCatat();
  if(name==='bengkel')renderBengkel();
  if(name==='notifikasi')renderNotifikasi();
  if(name==='riwayat')renderRiwayat();
}

// ============ VEHICLE CRUD ============
function simpanKendaraan(e){
  e.preventDefault();
  const d=getData();
  const v={
    id:genId(),
    jenis:document.getElementById('inJenis').value.trim(),
    oliIntervalKm:parseRibuan(document.getElementById('inOliKm').value),
    cvtMultiplier:parseInt(document.getElementById('inCvt').value),
    kmSekarang:parseRibuan(document.getElementById('inKmAwal').value),
    kmOliTerakhir:parseRibuan(document.getElementById('inKmOliTerakhir').value),
    oliCountSinceCvt:parseInt(document.getElementById('inOliCountCvt').value),
    createdAt:new Date().toISOString()
  };
  d.vehicles.push(v);setData(d);
  currentVehicleId=v.id;
  document.getElementById('formKendaraan').reset();
  showToast('Kendaraan berhasil ditambahkan! 🎉');
  showPage('dashboard');
  return false;
}

async function hapusKendaraan(id){
  const ok=await showConfirm('Hapus kendaraan dan semua datanya?');
  if(!ok)return;
  const d=getData();
  d.vehicles=d.vehicles.filter(v=>v.id!==id);
  d.logs=d.logs.filter(l=>l.vehicleId!==id);
  d.complaints=d.complaints.filter(c=>c.vehicleId!==id);
  d.services=d.services.filter(s=>s.vehicleId!==id);
  setData(d);
  if(currentVehicleId===id)currentVehicleId=d.vehicles[0]?.id||null;
  showToast('Kendaraan dihapus');
  showPage('dashboard');
}

// ============ STATUS CALCULATION ============
function getOliStatus(v){
  const driven=v.kmSekarang-v.kmOliTerakhir;
  const remaining=v.oliIntervalKm-driven;
  const pct=Math.min(Math.max(driven/v.oliIntervalKm,0),1);
  let color='#22c55e',label='Aman',level='safe';
  if(pct>=0.9){color='#ef4444';label='Segera Ganti!';level='danger';}
  else if(pct>=0.7){color='#eab308';label='Mendekati';level='warning';}
  return {driven,remaining:Math.max(remaining,0),pct,color,label,level};
}
function getCvtStatus(v){
  const oliLeft=v.cvtMultiplier-v.oliCountSinceCvt;
  return {oliLeft,needsSoon:oliLeft<=1};
}

// ============ DASHBOARD ============
function renderDashboard(){
  const d=getData();
  const noV=document.getElementById('noVehicle');
  const cards=document.getElementById('vehicleCards');
  const fab=document.getElementById('fabAdd');
  
  if(!d.vehicles.length){
    noV.classList.remove('hidden');cards.innerHTML='';fab.classList.add('hidden');
    updateNotifDot();return;
  }
  noV.classList.add('hidden');fab.classList.remove('hidden');fab.style.display='flex';
  
  // Check urgent complaints for notification dot
  updateNotifDot();

  cards.innerHTML=d.vehicles.map(v=>{
    const oli=getOliStatus(v);
    const cvt=getCvtStatus(v);
    const urgentComplaints=d.complaints.filter(c=>c.vehicleId===v.id&&!c.resolved&&c.priority==='darurat');
    const selected=v.id===currentVehicleId;
    
    return `
    <div class="card-glass rounded-2xl p-4 fade-in cursor-pointer transition-all ${selected?'ring-2 ring-sky-500':''}" onclick="currentVehicleId='${v.id}';showPage('detail')">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-lg flex items-center justify-center text-lg" style="background:${oli.level==='danger'?'rgba(239,68,68,0.2)':oli.level==='warning'?'rgba(234,179,8,0.2)':'rgba(34,197,94,0.2)'}">
            🏍️
          </div>
          <div>
            <p class="font-bold text-sm">${v.jenis}</p>
            <p class="text-[10px] text-slate-400">${fmtKm(v.kmSekarang)} KM</p>
          </div>
        </div>
        ${urgentComplaints.length?`<span class="bg-red-500/20 text-red-400 text-[10px] px-2 py-0.5 rounded-full font-semibold">⚠️ ${urgentComplaints.length} darurat</span>`:''}
      </div>
      
      <!-- Oil Bar -->
      <div class="mb-2">
        <div class="flex justify-between text-[10px] text-slate-400 mb-1">
          <span>Oli: ${fmtKm(oli.driven)} / ${fmtKm(v.oliIntervalKm)} KM</span>
          <span style="color:${oli.color}" class="font-bold">${oli.label}</span>
        </div>
        <div class="h-2.5 bg-slate-700 rounded-full overflow-hidden">
          <div class="h-full rounded-full transition-all" style="width:${oli.pct*100}%;background:${oli.color}"></div>
        </div>
        <p class="text-[10px] mt-1 ${oli.remaining<=200?'text-red-400 font-semibold':'text-slate-500'}">Sisa ${fmtKm(oli.remaining)} KM lagi ganti oli</p>
      </div>
      
      <!-- CVT -->
      <div class="flex items-center gap-2 text-[10px] text-slate-400">
        <span class="inline-flex items-center gap-1 bg-slate-800 px-2 py-1 rounded-lg">⚙️ CVT: ${cvt.oliLeft} ganti oli lagi</span>
        ${cvt.needsSoon?'<span class="text-yellow-400 font-semibold">Servis CVT segera!</span>':''}
      </div>
    </div>`;
  }).join('');
  
  lucide.createIcons();
}

// ============ DETAIL ============
function renderDetail(){
  const d=getData();
  const v=d.vehicles.find(x=>x.id===currentVehicleId);
  if(!v){showPage('dashboard');return;}
  const oli=getOliStatus(v);
  const cvt=getCvtStatus(v);
  const complaints=d.complaints.filter(c=>c.vehicleId===v.id&&!c.resolved);
  const el=document.getElementById('detailContent');
  
  el.innerHTML=`
  <button onclick="showPage('dashboard')" class="flex items-center gap-1 text-slate-400 text-sm mb-4"><i data-lucide="arrow-left" class="w-4 h-4"></i> Dashboard</button>
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-xl font-bold">${v.jenis}</h2>
    <button onclick="hapusKendaraan('${v.id}')" class="text-red-400 text-xs flex items-center gap-1"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i> Hapus</button>
  </div>
  
  <!-- Big KM Display -->
  <div class="card-glass rounded-2xl p-5 text-center mb-4">
    <p class="text-slate-400 text-xs mb-1">Odometer Saat Ini</p>
    <p class="text-3xl font-extrabold">${fmtKm(v.kmSekarang)} <span class="text-base font-normal text-slate-400">KM</span></p>
  </div>
  
  <!-- Oil Status Card -->
  <div class="card-glass rounded-2xl p-4 mb-3">
    <div class="flex items-center gap-2 mb-2">
      <span class="text-lg">🛢️</span>
      <span class="font-semibold text-sm">Status Oli</span>
    </div>
    <div class="h-4 bg-slate-700 rounded-full overflow-hidden mb-2">
      <div class="h-full rounded-full transition-all relative" style="width:${oli.pct*100}%;background:${oli.color}">
        ${oli.pct>0.15?`<span class="absolute right-2 top-1/2 -translate-y-1/2 text-[9px] font-bold text-white">${Math.round(oli.pct*100)}%</span>`:''}
      </div>
    </div>
    <div class="grid grid-cols-3 gap-2 text-center text-xs">
      <div class="bg-slate-800 rounded-lg p-2"><p class="text-slate-400">Sudah</p><p class="font-bold">${fmtKm(oli.driven)} KM</p></div>
      <div class="bg-slate-800 rounded-lg p-2"><p class="text-slate-400">Sisa</p><p class="font-bold" style="color:${oli.color}">${fmtKm(oli.remaining)} KM</p></div>
      <div class="bg-slate-800 rounded-lg p-2"><p class="text-slate-400">Interval</p><p class="font-bold">${fmtKm(v.oliIntervalKm)} KM</p></div>
    </div>
  </div>

function simpanCatatan(e){
  e.preventDefault();
  const d=getData();
  const v=d.vehicles.find(x=>x.id===currentVehicleId);
  if(!v)return false;
  
  const newKm=parseRibuan(document.getElementById('catatKm').value);
  if(newKm<v.kmSekarang){showToast('KM tidak boleh kurang dari sebelumnya');return false;}
  
  v.kmSekarang=newKm;
  
  // Log
  d.logs.push({id:genId(),vehicleId:v.id,km:newKm,date:new Date().toISOString()});
  
  // Complaint
  const keluhan=document.getElementById('catatKeluhan').value.trim();
  if(keluhan){
    const priority=document.querySelector('input[name="priority"]:checked')?.value||'ringan';

  }
  
  setData(d);
  showToast('Catatan tersimpan! ✅');
  showPage('dashboard');
  return false;
}

function simpanBengkel(e){
  e.preventDefault();
  const d=getData();
  const v=d.vehicles.find(x=>x.id===currentVehicleId);
  if(!v)return false;
  
  const newKm=parseRibuan(document.getElementById('bengkelKm').value);
  const biaya=parseRibuan(document.getElementById('bengkelBiaya').value);
  const lain=document.getElementById('bengkelLain').value.trim();
  
  const checks=[...document.querySelectorAll('input[name="repair"]:checked')];
  const repairs=[];
  let gantiOli=false,servisCvt=false;
  
  checks.forEach(ch=>{
    if(ch.value==='Ganti Oli'){gantiOli=true;repairs.push('Ganti Oli');}
    else if(ch.value==='Servis CVT'){servisCvt=true;repairs.push('Servis CVT');}
    else if(ch.value.startsWith('fix:')){
      const cid=ch.dataset.complaintId;
      const comp=d.complaints.find(c=>c.id===cid);
      if(comp){comp.resolved=true;repairs.push(comp.text);}
    }
  });
  if(lain)repairs.push(lain);
  
  if(!repairs.length){showToast('Pilih minimal 1 perbaikan');return false;}
  
  // Update vehicle
  v.kmSekarang=Math.max(v.kmSekarang,newKm);
  if(gantiOli){
    v.kmOliTerakhir=newKm;
    v.oliCountSinceCvt=(v.oliCountSinceCvt||0)+1;
  }
  if(servisCvt){
    v.oliCountSinceCvt=0;
  }
  
  // Service record
  d.services.push({
    id:genId(),vehicleId:v.id,km:newKm,repairs,biaya,date:new Date().toISOString()
  });
  
  setData(d);
  showToast('Data bengkel tersimpan! 🔧');
  showPage('dashboard');
  return false;
}

// ============ NOTIFIKASI ============
function getNotifications(){
  const d=getData();
  const notifs=[];
  d.vehicles.forEach(v=>{
    const oli=getOliStatus(v);
    const cvt=getCvtStatus(v);
    if(oli.level==='danger')notifs.push({type:'danger',icon:'🛢️',msg:`${v.jenis}: Segera ganti oli! Sisa ${fmtKm(oli.remaining)} KM`,vId:v.id});
    else if(oli.level==='warning')notifs.push({type:'warning',icon:'🛢️',msg:`${v.jenis}: Mendekati waktu ganti oli (sisa ${fmtKm(oli.remaining)} KM)`,vId:v.id});
    if(cvt.needsSoon)notifs.push({type:'warning',icon:'⚙️',msg:`${v.jenis}: Servis CVT semakin dekat`,vId:v.id});
    
    // Urgent complaints
    d.complaints.filter(c=>c.vehicleId===v.id&&!c.resolved&&c.priority==='darurat').forEach(c=>{
      notifs.push({type:'danger',icon:'🚨',msg:`${v.jenis}: ${c.text} (DARURAT)`,vId:v.id});
    });
    
    // Light complaints near oil change
    if(oli.pct>=0.7){
      d.complaints.filter(c=>c.vehicleId===v.id&&!c.resolved&&c.priority==='ringan').forEach(c=>{
        notifs.push({type:'info',icon:'🔔',msg:`${v.jenis}: Sekalian perbaiki "${c.text}" saat ganti oli`,vId:v.id});
      });
    }
  });
  return notifs;
}

function updateService(serviceId, e){
  e.preventDefault();
  const d=getData();
  const v=d.vehicles.find(x=>x.id===currentVehicleId);
  const service=d.services.find(s=>s.id===serviceId);
  if(!v||!service)return false;
  
  const newKm=parseRibuan(document.getElementById('editKm').value);
  const newBiaya=parseRibuan(document.getElementById('editBiaya').value);
  const checks=[...document.querySelectorAll('input[name="repair"]:checked')];
  const newRepairs=[];
  const resolvedComplaintIds=new Set();
  
  checks.forEach(ch=>{
    if(ch.value==='Ganti Oli'||ch.value==='Servis CVT'){
      newRepairs.push(ch.value);
    }else if(ch.value.startsWith('fix:')){
      const cid=ch.dataset.complaintId;
      resolvedComplaintIds.add(cid);
      const comp=d.complaints.find(c=>c.id===cid);
      if(comp)newRepairs.push(comp.text);
    }
  });
  
  if(!newRepairs.length){showToast('Pilih minimal 1 perbaikan');return false;}
  
  // Resolve complaints
  d.complaints.forEach(c=>{
    if(c.vehicleId===v.id){
      if(resolvedComplaintIds.has(c.id)){
        c.resolved=true;
      }
    }
  });
  
  // Update service record
  service.km=newKm;
  service.biaya=newBiaya;
  service.repairs=newRepairs;
  
  // Update vehicle if this was an oil change
  if(newRepairs.includes('Ganti Oli')){
    v.kmSekarang=Math.max(v.kmSekarang,newKm);
    v.kmOliTerakhir=newKm;
    v.oliCountSinceCvt=(v.oliCountSinceCvt||0)+1;
  }
  if(newRepairs.includes('Servis CVT')){
    v.oliCountSinceCvt=0;
  }
  
  setData(d);
  showToast('Data bengkel diperbarui! ✅');
  renderRiwayat();
  return false;
}

// Check urgent notifications on load
function checkUrgentOnLoad(){
  const d=getData();
  const urgents=[];
  d.vehicles.forEach(v=>{
    d.complaints.filter(c=>c.vehicleId===v.id&&!c.resolved&&c.priority==='darurat').forEach(c=>{
      urgents.push(`${v.jenis}: ${c.text}`);
    });
  });
  if(urgents.length){
    setTimeout(()=>showToast(`⚠️ ${urgents.length} keluhan darurat aktif!`,3500),500);
  }
}
